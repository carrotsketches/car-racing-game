<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Add It Up!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-wrapper">
        <a class="home-link" href="../">← Games</a>
        <header>
            <h1>Add It Up!</h1>
            <div class="hud">
                <div class="stat" id="player-tag">👤 <span id="player-name">—</span></div>
                <div class="stat">Q <span id="q-num">0</span>/<span id="q-total">10</span></div>
                <div class="stat">Score: <span id="score">0</span></div>
                <div class="stat">Best: <span id="best">0</span></div>
            </div>
        </header>

        <div class="stage">
            <div class="pad" id="pad">
                <div class="toggle-row">
                    <div class="mode-toggle" role="group" aria-label="Pick operation">
                        <button type="button" class="toggle-btn selected" data-op="add" aria-label="Addition">+</button>
                        <button type="button" class="toggle-btn" data-op="sub" aria-label="Subtraction">−</button>
                    </div>
                    <div class="mode-toggle" role="group" aria-label="Switch difficulty">
                        <button type="button" class="toggle-btn selected" data-level="easy">Easy 1–10</button>
                        <button type="button" class="toggle-btn" data-level="medium">Medium 1–20</button>
                    </div>
                    <div class="mode-toggle" role="group" aria-label="Switch layout">
                        <button type="button" class="toggle-btn selected" data-mode="horizontal">Across</button>
                        <button type="button" class="toggle-btn" data-mode="vertical">Stacked</button>
                    </div>
                    <div class="mode-toggle" role="group" aria-label="Pick number of questions">
                        <span class="toggle-label">Q:</span>
                        <button type="button" class="toggle-btn" data-count="5">5</button>
                        <button type="button" class="toggle-btn" data-count="8">8</button>
                        <button type="button" class="toggle-btn selected" data-count="10">10</button>
                    </div>
                </div>

                <div class="problem mode-horizontal" id="problem">
                    <div class="h-layout" id="h-layout">
                        <span class="h-num" id="h-a">0</span>
                        <span class="h-op" id="h-op">+</span>
                        <span class="h-num" id="h-b">0</span>
                        <span class="h-op">=</span>
                        <span class="h-ans" id="h-ans"></span>
                    </div>

                    <div class="v-layout" id="v-layout">
                        <div class="col-labels">
                            <span class="lbl lbl-tens">Tens</span>
                            <span class="lbl lbl-ones">Ones</span>
                        </div>

                        <div class="row row-a">
                            <span class="op"></span>
                            <span class="digit" id="a-tens"></span>
                            <span class="digit" id="a-ones"></span>
                        </div>

                        <div class="row row-b">
                            <span class="op" id="v-op">+</span>
                            <span class="digit" id="b-tens"></span>
                            <span class="digit" id="b-ones"></span>
                        </div>

                        <div class="bar"></div>

                        <div class="row row-ans">
                            <span class="op"></span>
                            <span class="slot" id="ans-tens">
                                <span class="carry" id="carry"></span>
                                <span class="slot-digit" id="ans-tens-digit"></span>
                            </span>
                            <span class="slot" id="ans-ones">
                                <span class="slot-digit" id="ans-ones-digit"></span>
                            </span>
                        </div>
                    </div>
                </div>

                <div class="hint" id="hint">Type the answer →</div>

                <div class="keypad" id="keypad" aria-label="Number keypad">
                    <button class="key" data-k="1">1</button>
                    <button class="key" data-k="2">2</button>
                    <button class="key" data-k="3">3</button>
                    <button class="key" data-k="4">4</button>
                    <button class="key" data-k="5">5</button>
                    <button class="key" data-k="6">6</button>
                    <button class="key" data-k="7">7</button>
                    <button class="key" data-k="8">8</button>
                    <button class="key" data-k="9">9</button>
                    <button class="key key-back" data-k="back">⌫</button>
                    <button class="key" data-k="0">0</button>
                    <button class="key key-check" data-k="check">✓</button>
                </div>
            </div>

            <div id="overlay" class="overlay">
                <div class="panel">
                    <h2 id="overlay-title">Ready?</h2>
                    <p id="overlay-msg">Practice + and − up to 20. Switch op, level, layout, or question count any time with the pill toggles at the top.</p>
                    <label class="name-row" for="name-input">
                        <span>Name</span>
                        <input id="name-input" type="text" maxlength="12" autocomplete="off"
                               spellcheck="false" placeholder="Player" />
                    </label>

                    <button id="start-btn">Start</button>
                </div>
            </div>
        </div>

        <footer>
            <p id="footer-text">Pick 5, 8, or 10 questions. Type the answer and press ✓.</p>
        </footer>
    </div>

    <script src="game.js"></script>
</body>
</html>
