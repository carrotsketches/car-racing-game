<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Clock It!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-wrapper">
        <a class="home-link" href="../">← Games</a>
        <header>
            <h1>Clock It!</h1>
        </header>

        <div class="stage">
            <div class="pad" id="pad">
                <div class="clock-wrap">
                    <svg class="clock" viewBox="0 0 200 200" aria-label="Analog clock" role="img">
                        <circle class="face" cx="100" cy="100" r="94" />
                        <circle class="rim" cx="100" cy="100" r="94" />
                        <g id="ticks"></g>
                        <g id="numbers"></g>
                        <line id="hour-hand" class="hand hour" x1="100" y1="100" x2="100" y2="55" />
                        <line id="minute-hand" class="hand minute" x1="100" y1="100" x2="100" y2="30" />
                        <circle class="pivot" cx="100" cy="100" r="6" />
                    </svg>
                </div>

                <div class="digital">
                    <div class="unit unit-hour">
                        <span class="unit-label">Hour</span>
                        <div class="spinner">
                            <button type="button" class="adjust" data-unit="hour" data-dir="-1" aria-label="Hour down">−</button>
                            <input type="number" id="hour-input" inputmode="numeric" min="1" max="12" value="3" aria-label="Hour">
                            <button type="button" class="adjust" data-unit="hour" data-dir="1" aria-label="Hour up">+</button>
                        </div>
                    </div>
                    <div class="colon">:</div>
                    <div class="unit unit-minute">
                        <span class="unit-label">Minute</span>
                        <div class="spinner">
                            <button type="button" class="adjust" data-unit="minute" data-dir="-1" aria-label="Minute down">−</button>
                            <input type="number" id="minute-input" inputmode="numeric" min="0" max="59" value="0" aria-label="Minute">
                            <button type="button" class="adjust" data-unit="minute" data-dir="1" aria-label="Minute up">+</button>
                        </div>
                    </div>
                </div>

                <div class="hint" id="hint">Type a time — watch the hands move!</div>
            </div>
        </div>

        <footer>
            <p>Blue hand = hour. Orange hand = minute.</p>
        </footer>
    </div>

    <script src="game.js"></script>
</body>
</html>
