<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Clock It!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-wrapper">
        <div class="nav-row">
            <a class="home-link" href="../">← Games</a>
            <button class="help-btn" id="help-btn" aria-label="How to play">?</button>
        </div>
        <header>
            <h1>Clock It!</h1>
        </header>

        <div class="stage">
            <div class="pad" id="pad">
                <div class="clock-wrap">
                    <svg class="clock" viewBox="0 0 200 200" aria-label="Analog clock" role="img">
                        <circle class="face" cx="100" cy="100" r="94" />
                        <circle class="rim" cx="100" cy="100" r="94" />
                        <g id="ticks"></g>
                        <g id="numbers"></g>
                        <line id="hour-hand" class="hand hour" x1="100" y1="100" x2="100" y2="55" />
                        <line id="minute-hand" class="hand minute" x1="100" y1="100" x2="100" y2="30" />
                        <circle class="pivot" cx="100" cy="100" r="6" />
                    </svg>
                </div>

                <div class="digital">
                    <button type="button" class="slot active" id="slot-hour" data-slot="hour" aria-label="Hour">
                        <span class="slot-label">Hour</span>
                        <span class="slot-value" id="hour-display">_</span>
                    </button>
                    <span class="colon">:</span>
                    <button type="button" class="slot" id="slot-minute" data-slot="minute" aria-label="Minute">
                        <span class="slot-label">Minute</span>
                        <span class="slot-value" id="minute-display">_ _</span>
                    </button>
                </div>

                <div class="hint" id="hint">Tap the numbers to set the time!</div>

                <div class="keypad" id="keypad" aria-label="Number keypad">
                    <button class="key" data-k="1">1</button>
                    <button class="key" data-k="2">2</button>
                    <button class="key" data-k="3">3</button>
                    <button class="key" data-k="4">4</button>
                    <button class="key" data-k="5">5</button>
                    <button class="key" data-k="6">6</button>
                    <button class="key" data-k="7">7</button>
                    <button class="key" data-k="8">8</button>
                    <button class="key" data-k="9">9</button>
                    <button class="key key-back" data-k="back">⌫</button>
                    <button class="key" data-k="0">0</button>
                    <button class="key key-clear" data-k="clear">C</button>
                </div>
            </div>
        </div>

        <footer>
            <p>Blue hand = hour. Orange hand = minute.</p>
        </footer>

        <div id="help-modal" class="help-modal" hidden>
            <div class="help-panel">
                <button class="help-close" id="help-close" aria-label="Close">✕</button>
                <h3>How to Play</h3>
                <p>A target time appears below the clock. Tap 'Hour' to select it, type the hour digits, then tap 'Minute' and type the minute digits. Set both hands to the right position to score!</p>
            </div>
        </div>
    </div>

    <script src="../shared/play-tracker.js" data-slug="clock-it"></script>
    <script src="game.js"></script>
</body>
</html>
