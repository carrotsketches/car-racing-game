<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Beta Games</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <a class="back-link" href="../">← Back</a>
    <main class="home">
        <h1 class="beta-title">🧪 Beta Games</h1>
        <p class="subtitle">Smoke test these first — once approved, they move to the main page.</p>

        <div class="game-grid">
            <a class="game-card crane-truck" href="../crane-truck/">
                <div class="emoji" aria-hidden="true">🏗️</div>
                <div class="title">Crane Truck</div>
                <div class="desc">Swing, drop, and deliver colored blocks!</div>
                <div class="badge">Beta</div>
            </a>

            <a class="game-card butterfly-garden" href="../butterfly-garden/">
                <div class="emoji" aria-hidden="true">🦋</div>
                <div class="title">Butterfly Garden</div>
                <div class="desc">Follow the flowers with your finger to sip nectar!</div>
                <div class="badge">Beta</div>
            </a>
        </div>
    </main>
</body>
</html>
