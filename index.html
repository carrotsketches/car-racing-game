<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Fun Games</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="home">
        <h1>🎮 Let's Play!</h1>
        <p class="subtitle">Pick a game to start</p>

        <div class="game-grid">
            <a class="game-card highway-dash" href="highway-dash/">
                <div class="emoji" aria-hidden="true">🚗</div>
                <div class="title">Highway Dash</div>
                <div class="desc">Dodge traffic and grab coins!</div>
                <div class="badge">Play</div>
            </a>

            <div class="game-card coming-soon" aria-disabled="true">
                <div class="emoji" aria-hidden="true">⭐</div>
                <div class="title">More soon!</div>
                <div class="desc">Another game is on the way</div>
            </div>
        </div>
    </main>
</body>
</html>
