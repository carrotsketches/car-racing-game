<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Critter Cruise</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-wrapper">
        <a class="home-link" href="../">← Games</a>
        <header>
            <h1>Critter Cruise</h1>
            <div class="hud">
                <div class="stat" id="player-tag">👤 <span id="player-name">—</span></div>
                <div class="stat">Score: <span id="score">0</span></div>
                <div class="stat hearts" id="hearts" aria-label="lives">❤️❤️❤️</div>
                <div class="stat">Best: <span id="best">0</span></div>
            </div>
        </header>

        <div class="stage">
            <canvas id="game" width="480" height="360"></canvas>

            <div id="overlay" class="overlay">
                <div class="panel">
                    <h2 id="overlay-title">Ready?</h2>
                    <p id="overlay-msg">Tap, click, or press Space to jump. Ride the hills, grab ⭐ and 🪙, dodge cones, and hit the boost pads!</p>
                    <label class="name-row" for="name-input">
                        <span>Name</span>
                        <input id="name-input" type="text" maxlength="12" autocomplete="off"
                               spellcheck="false" placeholder="Player" />
                    </label>
                    <button id="start-btn">Start</button>
                </div>
            </div>
        </div>

        <footer>
            <p>Tap / click / Space to jump. Ride the hills, grab treats, dodge cones, catch the boost pads!</p>
        </footer>
    </div>

    <script src="game.js"></script>
</body>
</html>
