<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Tow Truck</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-wrapper">
        <a class="home-link" href="../">← Games</a>
        <header>
            <h1>Tow Truck</h1>
            <div class="hud">
                <div class="stat" id="player-tag">👤 <span id="player-name">—</span></div>
                <div class="stat">Time: <span id="time">60</span></div>
                <div class="stat">Score: <span id="score">0</span></div>
                <div class="stat">Best: <span id="best">0</span></div>
            </div>
        </header>

        <div class="stage">
            <canvas id="game" width="400" height="600"></canvas>

            <div id="overlay" class="overlay">
                <div class="panel">
                    <h2 id="overlay-title">Rescue the broken cars!</h2>
                    <p id="overlay-msg">Drive alongside a stalled car, hold <strong>⛓</strong> to winch it onto your flatbed, then deliver it to the matching-color garage.</p>
                    <label class="name-row" for="name-input">
                        <span>Name</span>
                        <input id="name-input" type="text" maxlength="12" autocomplete="off"
                               spellcheck="false" placeholder="Player" />
                    </label>
                    <button id="start-btn">Start</button>
                    <div class="leaderboard" id="leaderboard">
                        <h3>🏆 Leaderboard</h3>
                        <ol id="leaderboard-list"></ol>
                    </div>
                </div>
            </div>
        </div>

        <div class="touch-controls" id="touch-controls" aria-label="Touch controls">
            <button class="touch-btn lane" data-key="left" aria-label="Move left">◀</button>
            <button class="touch-btn winch" id="winch-btn" aria-label="Winch / Drop">
                <span class="winch-label">⛓</span>
                <span class="winch-meter"><span class="winch-fill" id="winch-fill"></span></span>
            </button>
            <button class="touch-btn lane" data-key="right" aria-label="Move right">▶</button>
        </div>

        <footer><p>Tap ◀ ▶ to switch lanes. Hold ⛓ to winch. Line up with the matching garage to deliver!</p></footer>
    </div>

    <script src="game.js"></script>
</body>
</html>
